<!doctype html>
<html lang="th">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- SEO_START -->
    <title>IpeNovel — นิยายแปลออนไลน์</title>
    <meta
      name="description"
      content="อ่านนิยายแปลออนไลน์ นิยายแฟนฟิค นิยายกีฬา นิยายอนิเมะ และนิยายยอดนิยมบน IpeNovel" />
    <link rel="canonical" href="https://ipenovel.com/" />
    <!-- SEO_END -->
    <!-- Everything between SEO_START/SEO_END above is replaced per-request
         by server/services/serverSeoRenderer.ts for public routes (/,
         /novels, /novels/:id) so view-source and social-media crawlers see
         real, route-specific metadata instead of always this homepage
         default. The values above are only what a route with no
         server-side override (or a route visited before the server
         renderer runs, e.g. local static preview) ever sees. Client-side
         navigation after hydration is still handled by
         client/src/hooks/useDocumentHead.ts, which must stay consistent
         with this file's defaults and with serverSeoRenderer.ts's route
         table - see docs/PERFORMANCE_SEO_AUDIT.md. -->
    <!-- Reader fonts from Google Fonts (Prompt is the app default; the rest
         are selectable reading fonts in the Reader's settings panel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
